<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="tic-tac-toe-dark-styles.css">
    <link rel="icon" type="image/x-icon" href="chess-board-solid-full.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://kit.fontawesome.com/46f827a615.js" crossorigin="anonymous"></script>
</head>
<body>
    <p>Dark Mode: </p>
    <label class="switch">
    <input type="checkbox" id="theme_switcher" checked onclick="document.getElementsByTagName('link')[0].href = this.checked ? 'tic-tac-toe-dark-styles.css' : 'tic-tac-toe-light-styles.css'">
    <span  class="slider round" ></span>
    </label>
    
    <div id="allign-middle">
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <p id="nextplayer" >It is player <span id = "icon-in-text"><i class="fa-solid fa-circle-notch"></i></span>'s turn</p>
    <p id="wintext" class="invisible">Player <span id = "winicon"><i class="fa-solid fa-circle-notch"></i></span> has won the Game</p>
    <p id="tietext" class = "invisible">No one has won the game.(Tie)</p>
    <button id="reset">Reset</button>
    </div>
    <script>
        window.onload = function(){
            if (window.innerHeight < window.innerWidth){
                squares = document.getElementsByClassName("square")
                for (square of squares){
                    square.style.height = "20vh"
                    square.style.width = "20vh"
                    square.style.fontSize = "10vh"
                }
            }
            else{
                squares = document.getElementsByClassName("square")
                for (square of squares){
                    square.style.height = "20vw"
                    square.style.width = "20vw"
                    square.style.fontSize = "10vw"
                }
            }
        }
        const toggle_symbol = {
            '<i class="fa-solid fa-x"></i>':'<i class="fa-solid fa-circle-notch"></i>',
            '<i class="fa-solid fa-circle-notch"></i>':'<i class="fa-solid fa-x"></i>'
        } 
        let symbol
        let grid = Array(9).fill("#")
        let squares = document.getElementsByClassName("square")
        let winflag = false
        
        for (let [index,square] of Array.from(squares).entries()){
            square.addEventListener("click", () => draw(index))
        }
        clear()
        function draw(index){
            const square = squares[index]
            if (square.innerHTML == ''){
                document.getElementById("icon-in-text").innerHTML = symbol
                square.innerHTML = symbol = toggle_symbol[symbol]
                document.getElementById("winicon").innerHTML = symbol
                
                grid[index] = symbol
                console.log("print1:",grid)
                checkResult()
                
            }
            else{
                if (!square.childNodes[0].classList.contains("fa-shake")){
                square.childNodes[0].classList.add("fa-shake")
                setTimeout(()=>{square.childNodes[0].classList.remove("fa-shake")},200)
                }
            }
            
        }

        function win(blinking_squares){
            console.log("win")
                    winflag = true
                    for (square of squares){
                        square.disabled = true
                    }
                    squares[blinking_squares[0]].classList.add("wincolor")
                    squares[blinking_squares[1]].classList.add("wincolor")
                    squares[blinking_squares[2]].classList.add("wincolor")

                    squares[blinking_squares[0]].childNodes[0].classList.add("fa-bounce")
                    squares[blinking_squares[1]].childNodes[0].classList.add("fa-bounce")
                    squares[blinking_squares[2]].childNodes[0].classList.add("fa-bounce")

                    squares[blinking_squares[0]].disabled = false
                    squares[blinking_squares[2]].disabled = false
                    squares[blinking_squares[1]].disabled = false

                    document.getElementById("nextplayer").classList.add("invisible")
                    document.getElementById("wintext").classList.remove("invisible")

                    


        }

        function checkResult(){
            console.log("print:",grid)
            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[1] && grid[0] == grid[2] ){
                    win([0,1,2])


                }}
            if ( grid[3] != '#'){
                if (grid[3] == grid[4] && grid[3] == grid[5] ){
                    win([3,4,5])
                }}
            if ( grid[6] != '#'){
                if (grid[6] == grid[7] && grid[6] == grid[8] ){
                    win([6,7,8])
                }}
            

            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[3] && grid[0] == grid[6] ){
                    win([0,3,6])
                }}
            if ( grid[1] != '#'){
                if (grid[1] == grid[4] && grid[1] == grid[7] ){
                    win([1,4,7])
                }}
            if ( grid[2] != '#'){
                if (grid[2] == grid[5] && grid[2] == grid[8] ){
                    win([2,5,8])
                }}


            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[4] && grid[0] == grid[8] ){
                    win([0,4,8])
                }}
            if ( grid[2] != '#'){
                if (grid[2] == grid[4] && grid[2] == grid[6] ){
                    win([2,4,6])

            

                }}
            if (!grid.includes("#")){
                    tie()
                }
            }
            

        
        document.getElementById("reset").addEventListener("click", clear)
        function clear(){
            for (let square of squares){
                square.innerHTML = ''
                symbol = '<i class="fa-solid fa-x"></i>'
                document.getElementById("icon-in-text").innerHTML = toggle_symbol[symbol]
                document.getElementById("winicon").innerHTML = symbol
                square.classList.remove("wincolor")
                if (square.childNodes[0] != undefined){
                    square.childNodes[0].classList.remove("fa-bounce")
                }
                grid = Array(9).fill("#")
                console.log("grid:",grid)
                document.getElementById("wintext").classList.add("invisible")
                document.getElementById("nextplayer").classList.remove("invisible")
                document.getElementById("tietext").classList.add("invisible")
                winflag = false
                for (square of squares){
                        square.disabled = false
                    }
                

            
        }
        }
        
        function tie(){
            if (winflag == false){
                document.getElementById("nextplayer").classList.add("invisible")
                document.getElementById("tietext").classList.remove("invisible")
        }
        }


    </script>

</body>
</html>
