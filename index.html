<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="tic-tac-toe-styles.css">
    <link rel="icon" type="image/x-icon" href="chess-board-solid-full.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://kit.fontawesome.com/46f827a615.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="allign-middle">
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <div class="row"><button class="square"></button><button class="square"></button><button class="square"></button></div>
    <button id="reset">Reset</button>
    </div>
    <script>
        const toggle_symbol = {
            '<i class="fa-solid fa-x"></i>':'<i class="fa-solid fa-o"></i>',
            '<i class="fa-solid fa-o"></i>':'<i class="fa-solid fa-x"></i>'
        } 
        let symbol
        let grid = Array(9).fill("#")
        let squares = document.getElementsByClassName("square")
        
        for (let [index,square] of Array.from(squares).entries()){
            square.addEventListener("click", () => draw(index))
        }
        clear()
        function draw(index){
            const square = squares[index]
            if (square.innerHTML == ''){
                square.innerHTML = symbol = toggle_symbol[symbol]
                console.log("print:",grid)
                grid[index] = symbol
                checkResult()
            }
            else{
                if (!square.childNodes[0].classList.contains("fa-shake")){
                square.childNodes[0].classList.add("fa-shake")
                setTimeout(()=>{square.childNodes[0].classList.remove("fa-shake")},200)
                }
            }
        }
        function checkResult(){
            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[1] && grid[0] == grid[2] ){
                    console.log("win")
                    squares[0].classList.add("wincolor")
                    squares[1].classList.add("wincolor")
                    squares[2].classList.add("wincolor")

                    squares[0].childNodes[0].classList.add("fa-bounce")
                    squares[1].childNodes[0].classList.add("fa-bounce")
                    squares[2].childNodes[0].classList.add("fa-bounce")
                }}
            if ( grid[3] != '#'){
                if (grid[3] == grid[4] && grid[3] == grid[5] ){
                    console.log("win")
                    squares[3].classList.add("wincolor")
                    squares[4].classList.add("wincolor")
                    squares[5].classList.add("wincolor")
                    
                    squares[3].childNodes[0].classList.add("fa-bounce")
                    squares[4].childNodes[0].classList.add("fa-bounce")
                    squares[5].childNodes[0].classList.add("fa-bounce")
                }}
            if ( grid[6] != '#'){
                if (grid[6] == grid[7] && grid[6] == grid[8] ){
                    console.log("win")
                    squares[6].classList.add("wincolor")
                    squares[7].classList.add("wincolor")
                    squares[8].classList.add("wincolor")
                    
                    squares[6].childNodes[0].classList.add("fa-bounce")
                    squares[7].childNodes[0].classList.add("fa-bounce")
                    squares[8].childNodes[0].classList.add("fa-bounce")
                }}
            

            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[3] && grid[0] == grid[6] ){
                    console.log("win")
                    squares[0].classList.add("wincolor")
                    squares[3].classList.add("wincolor")
                    squares[6].classList.add("wincolor")
                    
                    squares[0].childNodes[0].classList.add("fa-bounce")
                    squares[3].childNodes[0].classList.add("fa-bounce")
                    squares[6].childNodes[0].classList.add("fa-bounce")
                }}
            if ( grid[1] != '#'){
                if (grid[1] == grid[4] && grid[1] == grid[7] ){
                    console.log("win")
                    squares[1].classList.add("wincolor")
                    squares[4].classList.add("wincolor")
                    squares[7].classList.add("wincolor")
                    
                    squares[1].childNodes[0].classList.add("fa-bounce")
                    squares[4].childNodes[0].classList.add("fa-bounce")
                    squares[7].childNodes[0].classList.add("fa-bounce")
                }}
            if ( grid[2] != '#'){
                if (grid[2] == grid[5] && grid[2] == grid[8] ){
                    console.log("win")
                    squares[2].classList.add("wincolor")
                    squares[5].classList.add("wincolor")
                    squares[8].classList.add("wincolor")
                    
                    squares[2].childNodes[0].classList.add("fa-bounce")
                    squares[5].childNodes[0].classList.add("fa-bounce")
                    squares[8].childNodes[0].classList.add("fa-bounce")
                }}


            if ( grid[0] != '#'){
                console.log("inside grid 0 != #")    
                if (grid[0] == grid[4] && grid[0] == grid[8] ){
                    console.log("win")
                    squares[0].classList.add("wincolor")
                    squares[4].classList.add("wincolor")
                    squares[8].classList.add("wincolor")

                    squares[0].childNodes[0].classList.add("fa-bounce")
                    squares[4].childNodes[0].classList.add("fa-bounce")
                    squares[8].childNodes[0].classList.add("fa-bounce")
                }}
            if ( grid[2] != '#'){
                if (grid[2] == grid[4] && grid[2] == grid[6] ){
                    console.log("win")
                    squares[2].classList.add("wincolor")
                    squares[4].classList.add("wincolor")
                    squares[6].classList.add("wincolor")

                    squares[2].childNodes[0].classList.add("fa-bounce")
                    squares[4].childNodes[0].classList.add("fa-bounce")
                    squares[6].childNodes[0].classList.add("fa-bounce")


                }}
            }
            

        
        document.getElementById("reset").addEventListener("click", clear)
        function clear(){
            for (let square of squares){
                square.innerHTML = ''
                symbol = '<i class="fa-solid fa-x"></i>'
                square.classList.remove("wincolor")
                if (square.childNodes[0] != undefined){
                    square.childNodes[0].classList.remove("fa-bounce")
                }
                grid = Array(9).fill("#")
                console.log("grid:",grid)
            
        }
        }



    </script>

</body>
</html>
